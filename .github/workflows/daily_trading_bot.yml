name: Daily Trading Bot Ensemble

on:
  schedule:
    # Runs at 11:00 PM UTC Monday-Friday 
    # Adjust the cron schedule to match when your market data is ready
    # changing the schedule to run at 15,30,45 minutes of 10,11 A.M IST. 
    - cron: '50 3 * * 1-5'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.13' # Adjust to your needed version

      - name: Install Dependencies
        # Make sure your requirements.txt includes stable-baselines3, google-api-python-client, etc.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot Script
        env:
          DRIVE_TOKEN_JSON: ${{ secrets.DRIVE_TOKEN_JSON }}
          # This pulls your Secret and injects it as an environment variable for Python to read
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          python final_script_n.py
